<!DOCTYPE html>
<html>

<head>
    <title>Booking Form</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .booking-box{
            width: 380px;
            margin: 70px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .booking-box h1{
            margin-bottom: 25px;
        }

        .booking-box input{
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .booking-box button{
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 30px;
            background: #FFD814;
            font-size: 18px;
            cursor: pointer;
        }

        .booking-box button:hover{
            background: #f7ca00;
        }

        .product-id{
            margin-bottom: 20px;
            color: #555;
            font-size: 15px;
        }

    </style>
</head>

<body>

<div class="booking-box">

    <h1>Booking Form</h1>

    <p class="product-id" id="productText"></p>

    <form id="bookingForm">

        <input type="text" id="name" placeholder="Your Name" required>

        <input type="text" id="number" placeholder="WhatsApp Number" required>

        <input type="text" id="referral" placeholder="Referral ID">

        <button type="submit">Confirm Booking</button>

    </form>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const productId = params.get("product");

document.getElementById("productText").innerText =
"Selected Product ID: " + productId;

document.getElementById("bookingForm").addEventListener("submit", function(e){

    e.preventDefault();

    fetch("https://script.google.com/macros/s/AKfycbwhauSrhDOC-MIc8GaxRZA-lZ9PLNGVBSRLWmIev1-zCVzid5Ujgr7qac3z2ZddwWxE/exec", {

        method: "POST",

        body: new URLSearchParams({

            name: document.getElementById("name").value,

            number: document.getElementById("number").value,

            referral: document.getElementById("referral").value,

            product: productId

        })

    })

    .then(() => {

        window.location.href = "conf.html";

    });

});

</script>

</body>
</html>
